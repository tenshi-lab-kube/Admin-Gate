apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: admin-gate
  labels:
    app: admin-gate
spec:
  rules:
    - host: admin-gate.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-gate
                port:
                  number: 80
