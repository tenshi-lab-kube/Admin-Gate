<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ff9dcc" />
    <title>Admin Gate</title>
    <style>
      :root {
        --ink: #543249;
        --pink: #ff9dcc;
        --pink-soft: #ffe0ef;
        --mint: #a7f3dc;
        --lemon: #fff2a8;
        --lavender: #d9c9ff;
        --white: rgba(255, 255, 255, 0.82);
        --shadow: rgba(122, 69, 101, 0.22);
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        color: var(--ink);
        font-family: "Comic Sans MS", "Trebuchet MS", system-ui, sans-serif;
        background:
          radial-gradient(circle at 16% 18%, rgba(255, 255, 255, 0.95) 0 5px, transparent 6px),
          radial-gradient(circle at 84% 20%, rgba(255, 255, 255, 0.82) 0 7px, transparent 8px),
          radial-gradient(circle at 28% 82%, rgba(255, 255, 255, 0.86) 0 6px, transparent 7px),
          linear-gradient(135deg, #ffd6ea 0%, #fff6bf 46%, #c9f6ec 100%);
      }

      .bubble {
        position: fixed;
        width: 92px;
        height: 92px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.42);
        box-shadow: 0 0 0 14px rgba(255, 255, 255, 0.17);
        pointer-events: none;
        animation: float 6s ease-in-out infinite;
      }

      .bubble:nth-child(1) {
        top: 9%;
        left: 9%;
      }

      .bubble:nth-child(2) {
        right: 11%;
        bottom: 12%;
        width: 70px;
        height: 70px;
        animation-delay: -2s;
      }

      .bubble:nth-child(3) {
        left: 13%;
        bottom: 12%;
        width: 46px;
        height: 46px;
        animation-delay: -4s;
      }

      main {
        width: min(92vw, 590px);
        min-height: 440px;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .panel {
        width: 100%;
        padding: clamp(30px, 8vw, 58px);
        text-align: center;
        border: 3px solid rgba(255, 255, 255, 0.76);
        border-radius: 8px;
        background: var(--white);
        box-shadow: 0 28px 70px var(--shadow);
        backdrop-filter: blur(12px);
      }

      .mascot {
        position: relative;
        width: 112px;
        height: 92px;
        margin: 0 auto 22px;
        border: 4px solid #fff;
        border-radius: 48% 48% 42% 42%;
        background: linear-gradient(160deg, var(--lemon), var(--pink));
        box-shadow: 0 12px 24px rgba(255, 143, 199, 0.28);
      }

      .mascot::before,
      .mascot::after {
        content: "";
        position: absolute;
        top: 31px;
        width: 13px;
        height: 13px;
        border-radius: 999px;
        background: var(--ink);
        box-shadow: 0 14px 0 -5px rgba(255, 116, 166, 0.8);
      }

      .mascot::before {
        left: 31px;
      }

      .mascot::after {
        right: 31px;
      }

      .mouth {
        position: absolute;
        left: 50%;
        bottom: 28px;
        width: 24px;
        height: 12px;
        border-right: 4px solid var(--ink);
        border-bottom: 4px solid var(--ink);
        border-left: 4px solid var(--ink);
        border-radius: 0 0 999px 999px;
        transform: translateX(-50%);
      }

      h1,
      h2 {
        margin: 0;
        letter-spacing: 0;
        line-height: 1.02;
      }

      h1 {
        font-size: clamp(2.2rem, 8vw, 4.15rem);
      }

      h2 {
        font-size: clamp(2.25rem, 9vw, 4.45rem);
      }

      .subtitle {
        margin: 16px auto 0;
        max-width: 34ch;
        font-size: 1.05rem;
        line-height: 1.55;
      }

      .buttons {
        min-height: 126px;
        margin-top: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 18px;
        flex-wrap: wrap;
      }

      button {
        min-width: 102px;
        min-height: 54px;
        padding: 0 24px;
        border: 0;
        border-radius: 999px;
        color: var(--ink);
        font: 800 1rem/1 "Comic Sans MS", "Trebuchet MS", system-ui, sans-serif;
        cursor: pointer;
        box-shadow: 0 10px 20px rgba(117, 70, 98, 0.16);
        transform-origin: center;
        transition:
          transform 240ms ease,
          font-size 240ms ease,
          min-width 240ms ease,
          min-height 240ms ease,
          opacity 240ms ease;
      }

      button:focus-visible {
        outline: 4px solid rgba(255, 143, 199, 0.52);
        outline-offset: 4px;
      }

      #yesButton {
        background: linear-gradient(135deg, var(--mint), #fbffbc);
      }

      #noButton {
        background: linear-gradient(135deg, var(--pink-soft), var(--lavender));
      }

      .success {
        display: none;
      }

      .hearts {
        margin-top: 22px;
        color: #ff69ad;
        font-size: 1.9rem;
        letter-spacing: 8px;
      }

      body.accepted .question {
        display: none;
      }

      body.accepted .success {
        display: block;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0) scale(1);
        }

        50% {
          transform: translateY(-16px) scale(1.08);
        }
      }

      @media (max-width: 440px) {
        .buttons {
          gap: 12px;
        }

        button {
          min-width: 88px;
          padding: 0 18px;
        }
      }
    </style>
  </head>
  <body>
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>

    <main>
      <section class="panel question" aria-label="Question">
        <div class="mascot" aria-hidden="true"><span class="mouth"></span></div>
        <h1>Veux-tu être mon admin ?</h1>
        <p class="subtitle">Promis, il y aura des permissions, du chaos organisé et beaucoup trop de rose.</p>
        <div class="buttons">
          <button id="yesButton" type="button">Oui</button>
          <button id="noButton" type="button">Non</button>
        </div>
      </section>

      <section class="panel success" aria-label="Réponse">
        <div class="mascot" aria-hidden="true"><span class="mouth"></span></div>
        <h2>je savais que tu dirais oui</h2>
        <div class="hearts" aria-hidden="true">♡ ♡ ♡</div>
      </section>
    </main>

    <script>
      const yesButton = document.querySelector("#yesButton");
      const noButton = document.querySelector("#noButton");
      let noClicks = 0;

      noButton.addEventListener("click", () => {
        noClicks += 1;
        const noScale = Math.max(0.18, 1 - noClicks * 0.16);
        const yesScale = Math.min(2.9, 1 + noClicks * 0.24);

        noButton.style.transform = `scale(${noScale}) rotate(${noClicks % 2 ? -5 : 5}deg)`;
        noButton.style.opacity = Math.max(0.26, 1 - noClicks * 0.09);
        yesButton.style.transform = `scale(${yesScale})`;
        yesButton.style.fontSize = `${1 + noClicks * 0.08}rem`;
        yesButton.style.minWidth = `${102 + noClicks * 18}px`;
        yesButton.style.minHeight = `${54 + noClicks * 8}px`;

        if (noClicks >= 7) {
          noButton.textContent = "mini non";
        }
      });

      yesButton.addEventListener("click", () => {
        document.body.classList.add("accepted");
      });
    </script>
  </body>
</html>
